# Production stack config (committed — config, NOT secret; the gitignore carries an
# exception for this one file). Values here are declared intent; the live apply is
# human-gated.
#
# adminCidrs locks the Talos apid (50000) + kube-apiserver (6443) to the operator.
# The value below is an RFC 5737 documentation placeholder — REPLACE with Calum's
# real /32(s) before apply. The fail-closed guard (guards.ts) rejects 0.0.0.0/0 at
# apply, and the CI runner's own IP is injected transiently by the up-job (see the
# #4 apiserver-reachability decision), so it is deliberately NOT listed here.
config:
  tidepool-cluster:location: nbg1
  tidepool-cluster:adminCidrs: 135.196.84.115/32
  # Digest-pinned application images (PR-6.5). Immutable `@sha256:` refs — never a
  # mutable tag — so the control-plane rollout is reproducible. Bump deliberately
  # when cutting a release (get the digest from the images.yml ghcr push).
  tidepool-cluster:controlPlaneImage: ghcr.io/0x63616c/tidepool-control-plane@sha256:33233e838de5b38e68f144eb3b02cfc8c43698b957278628d9770e6c4b3631a0
  tidepool-cluster:agentWorkerImage: ghcr.io/0x63616c/tidepool-agent-worker@sha256:7455a02f93192f1a372ce1056c8ca79be84664c3518880bbc9f63033160a070c
