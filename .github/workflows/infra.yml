name: infra

# Tidepool Kubernetes cluster (Pulumi, infra/pulumi/cluster).
#   PR   → `pulumi preview` (read-only: computes the plan, creates NOTHING).
#   main → `pulumi up`, but the job runs in the `production` GitHub Environment,
#          which requires a human (Calum) to click approve. So MERGING is safe —
#          the live apply pauses for a human, never auto-spends (tenet 6).
#          On success the job comments the deploy result on the merged PR — squash
#          merges break GitHub's native PR↔deployment link, so we post it ourselves.
#
# Secrets flow: SOPS_AGE_KEY (the `ci` age key) is the ONLY GitHub Actions secret.
# It decrypts the hcloud token, Hetzner S3 creds, and the Pulumi config passphrase
# from sops at run time; the S3 creds also unlock the self-managed Pulumi state
# backend, and the passphrase decrypts that state's secrets. Nothing else is a
# GH secret; nothing sensitive is committed.

on:
  push:
    branches: [main]
    # App-source paths are included so a CODE change (baked into the control-plane +
    # agent-worker images) auto-deploys: the deploy-job resolves the new image digest and
    # rerolls. Kept OFF pull_request below so code PRs don't run the (barman-red,
    # secret-touching) infra preview — deploy happens only on merge.
    paths:
      - 'src/**'
      - 'package.json'
      - 'bun.lock'
      - 'infra/docker/**'
      - 'infra/pulumi/cluster/**'
      - '.github/workflows/infra.yml'
      - 'secrets/hcloud_api_token.enc.yaml'
      - 'secrets/hetzner_s3_credentials.enc.yaml'
      - 'secrets/pulumi_config_passphrase.enc.yaml'
      - '.sops.yaml'
  pull_request:
    paths:
      - 'infra/pulumi/cluster/**'
      - '.github/workflows/infra.yml'
      - 'secrets/hcloud_api_token.enc.yaml'
      - 'secrets/hetzner_s3_credentials.enc.yaml'
      - 'secrets/pulumi_config_passphrase.enc.yaml'
      - '.sops.yaml'

permissions:
  contents: read
  packages: read # deploy-job pulls the current commit's image digests from ghcr (auto-deploy)
  pull-requests: write # deploy-job comments the deploy result on the merged PR (GitLab-style visibility)
  deployments: read # deploy-job reads the environment deployment url for the PR comment

# Never cancel an in-flight apply; previews are cheap enough to let run.
concurrency:
  group: infra-${{ github.ref }}
  cancel-in-progress: false

env:
  WORK_DIR: infra/pulumi/cluster
  STACK: production
  # Self-managed Pulumi state on Hetzner Object Storage (public, non-secret).
  PULUMI_BACKEND_URL: 's3://tidepool-pulumi-state?endpoint=nbg1.your-objectstorage.com&s3ForcePathStyle=true&region=nbg1'
  AWS_REGION: nbg1
  SOPS_VERSION: v3.13.2

jobs:
  preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19
      - name: install deps
        working-directory: ${{ env.WORK_DIR }}
        run: bun install --frozen-lockfile
      - name: decrypt creds (sops + ci age key)
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          curl -fsSL -o /usr/local/bin/sops \
            "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.amd64"
          chmod +x /usr/local/bin/sops
          hcloud_token=$(sops -d --extract '["hcloud_api_token"]' secrets/hcloud_api_token.enc.yaml)
          aws_key=$(sops -d --extract '["access_key_id"]' secrets/hetzner_s3_credentials.enc.yaml)
          aws_secret=$(sops -d --extract '["secret_access_key"]' secrets/hetzner_s3_credentials.enc.yaml)
          pulumi_passphrase=$(sops -d --extract '["pulumi_config_passphrase"]' secrets/pulumi_config_passphrase.enc.yaml)
          echo "::add-mask::$hcloud_token"; echo "::add-mask::$aws_key"; echo "::add-mask::$aws_secret"
          echo "::add-mask::$pulumi_passphrase"
          {
            echo "HCLOUD_TOKEN=$hcloud_token"
            echo "AWS_ACCESS_KEY_ID=$aws_key"
            echo "AWS_SECRET_ACCESS_KEY=$aws_secret"
            echo "PULUMI_CONFIG_PASSPHRASE=$pulumi_passphrase"
          } >>"$GITHUB_ENV"
      - name: pulumi preview
        uses: pulumi/actions@v6
        with:
          command: preview
          stack-name: ${{ env.STACK }}
          # Create `production` in the fresh S3 backend if absent (stack select
          # --create); no-op selecting the existing stack on later runs.
          upsert: true
          work-dir: ${{ env.WORK_DIR }}
          cloud-url: ${{ env.PULUMI_BACKEND_URL }}
        # PULUMI_CONFIG_PASSPHRASE is exported to $GITHUB_ENV from sops above.

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Fully automatic: a merge to main builds images (images.yml) then this job
    # resolves the current commit's digests and applies — no human gate (personal
    # scale, blast radius small). The `production` environment is kept as a GitHub
    # deployment label only; add required reviewers here to reintroduce a gate.
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19
      - name: install deps
        working-directory: ${{ env.WORK_DIR }}
        run: bun install --frozen-lockfile
      - name: install hcloud CLI + hcloud-upload-image (Talos snapshot bake)
        run: |
          # hcloud CLI — bake-talos.sh queries/labels snapshots with it.
          cli=v1.51.0
          curl -fsSL -o /tmp/hcloud.tar.gz \
            "https://github.com/hetznercloud/cli/releases/download/${cli}/hcloud-linux-amd64.tar.gz"
          tar -xzf /tmp/hcloud.tar.gz -C /usr/local/bin hcloud
          chmod +x /usr/local/bin/hcloud
          # hcloud-upload-image — bakes the Talos snapshot (throwaway server).
          # Tool lives under apricote/ (the maintainer), not the hetznercloud org.
          ver=v1.5.0
          curl -fsSL -o /tmp/hui.tar.gz \
            "https://github.com/apricote/hcloud-upload-image/releases/download/${ver}/hcloud-upload-image_Linux_x86_64.tar.gz"
          tar -xzf /tmp/hui.tar.gz -C /usr/local/bin hcloud-upload-image
          chmod +x /usr/local/bin/hcloud-upload-image
      - name: decrypt creds (sops + ci age key)
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          curl -fsSL -o /usr/local/bin/sops \
            "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.amd64"
          chmod +x /usr/local/bin/sops
          hcloud_token=$(sops -d --extract '["hcloud_api_token"]' secrets/hcloud_api_token.enc.yaml)
          aws_key=$(sops -d --extract '["access_key_id"]' secrets/hetzner_s3_credentials.enc.yaml)
          aws_secret=$(sops -d --extract '["secret_access_key"]' secrets/hetzner_s3_credentials.enc.yaml)
          pulumi_passphrase=$(sops -d --extract '["pulumi_config_passphrase"]' secrets/pulumi_config_passphrase.enc.yaml)
          # PR-6.5 (human-approved tenet-9 widening): the control-plane k8s Secret
          # is seeded from these two. deploy-job ONLY — preview renders them empty.
          forge_token=$(sops -d --extract '["forge_github_token"]' secrets/forge_github_token.enc.yaml)
          opencode_auth=$(sops -d --extract '["runner_opencode_auth_json"]' secrets/runner_opencode_auth_json.enc.yaml)
          echo "::add-mask::$hcloud_token"; echo "::add-mask::$aws_key"; echo "::add-mask::$aws_secret"
          echo "::add-mask::$pulumi_passphrase"; echo "::add-mask::$forge_token"
          # opencode auth is JSON and may be multi-line: mask line-by-line — a single
          # `::add-mask::$multiline` would register only line 1 and PRINT the rest.
          while IFS= read -r l; do [ -n "$l" ] && echo "::add-mask::$l"; done <<<"$opencode_auth"
          {
            echo "HCLOUD_TOKEN=$hcloud_token"
            echo "AWS_ACCESS_KEY_ID=$aws_key"
            echo "AWS_SECRET_ACCESS_KEY=$aws_secret"
            echo "PULUMI_CONFIG_PASSPHRASE=$pulumi_passphrase"
            echo "TIDEPOOL_FORGE_GITHUB_TOKEN=$forge_token"
          } >>"$GITHUB_ENV"
          # Multi-line-safe export (heredoc): a plain `NAME=$val` truncates JSON at
          # the first newline and corrupts $GITHUB_ENV.
          {
            echo "TIDEPOOL_OPENCODE_AUTH_JSON<<TIDEPOOL_OC_EOF"
            printf '%s\n' "$opencode_auth"
            echo "TIDEPOOL_OC_EOF"
          } >>"$GITHUB_ENV"
      - name: compute this runner's egress IP (#4 JIT apiserver reachability)
        run: |
          # The firewall opens 6443+50000 to admin /32(s) + THIS runner /32, applied
          # THROUGH pulumi (no out-of-band drift). Fail if the IP can't be resolved —
          # a missing runner IP would otherwise apply with the ports admin-only and
          # the bootstrap/apply steps would hang.
          ip=$(curl -fsSL https://api.ipify.org)
          [ -n "$ip" ] || { echo "could not resolve runner IP"; exit 1; }
          echo "::add-mask::$ip"
          echo "TIDEPOOL_CI_RUNNER_CIDR=${ip}/32" >>"$GITHUB_ENV"
      - name: resolve this commit's image digests (auto-deploy)
        run: |
          # Merge→deploy: reroll with THIS commit's freshly-built images. images.yml
          # (which pushes :${sha}) runs in parallel with this job, so poll ghcr for
          # the tag, and FAIL CLOSED if it never appears — a merge must never apply a
          # stale image. config.ts (pickImage) prefers these over the git-pinned
          # default and rejects a non-@sha256 ref.
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          # Diagnostics MUST go to stderr — stdout is captured as the resolved ref,
          # so a "waiting..." line on stdout would poison $GITHUB_ENV (invalid format).
          resolve() {
            repo="$1"
            tries=0
            until digest=$(docker buildx imagetools inspect "ghcr.io/0x63616c/${repo}:${{ github.sha }}" --format '{{.Manifest.Digest}}' 2>/dev/null); do
              tries=$((tries + 1))
              # 60×10s = 10min. images.yml runs in parallel and a rapid series of
              # merges cancels-in-progress → a cold base-image rebuild (~6-8min), so
              # a 5min window could time out before the image lands (it did once).
              if [ "$tries" -ge 60 ]; then
                echo "timed out waiting for ghcr.io/0x63616c/${repo}:${{ github.sha }}" >&2
                return 1
              fi
              echo "waiting for ${repo}:${{ github.sha }} (attempt ${tries})..." >&2
              sleep 10
            done
            printf 'ghcr.io/0x63616c/%s@%s' "$repo" "$digest"
          }
          # Assign first so `set -e` fails the step closed if a resolve times out,
          # rather than writing an empty override.
          cp=$(resolve tidepool-control-plane)
          aw=$(resolve tidepool-agent-worker)
          {
            echo "TIDEPOOL_DEPLOY_CONTROL_PLANE_IMAGE=${cp}"
            echo "TIDEPOOL_DEPLOY_AGENT_WORKER_IMAGE=${aw}"
          } >>"$GITHUB_ENV"
      - name: ensure Pulumi state bucket exists (bootstrap seam)
        # Pulumi can't create its own backend (circular), so this idempotent step
        # (re)creates tidepool-pulumi-state from the sops-decrypted S3 keys already in
        # $GITHUB_ENV — making a keys-only cold start (scorched-earth → rebuild) fully
        # hands-free. RGW-idempotent, so a normal deploy is a no-op. deploy job ONLY:
        # preview is read-only and must never create a resource. AWS_REGION is the
        # top-level env; AWS_ACCESS_KEY_ID/SECRET come from the decrypt step above.
        run: bash infra/pulumi/cluster/ensure-state-bucket.sh
      - name: pulumi up
        uses: pulumi/actions@v6
        with:
          command: up
          stack-name: ${{ env.STACK }}
          # Create `production` in the fresh S3 backend if absent (stack select
          # --create); no-op selecting the existing stack on later runs.
          upsert: true
          work-dir: ${{ env.WORK_DIR }}
          cloud-url: ${{ env.PULUMI_BACKEND_URL }}
        env:
          # PULUMI_CONFIG_PASSPHRASE is exported to $GITHUB_ENV from sops above.
          # Consumed by config.ts → firewall control-port allow-list (self-healing;
          # next apply overwrites this /32 with the new runner IP).
          TIDEPOOL_CI_RUNNER_CIDR: ${{ env.TIDEPOOL_CI_RUNNER_CIDR }}
          # Auto-deploy: current-commit image digests → config.ts pickImage override.
          TIDEPOOL_DEPLOY_CONTROL_PLANE_IMAGE: ${{ env.TIDEPOOL_DEPLOY_CONTROL_PLANE_IMAGE }}
          TIDEPOOL_DEPLOY_AGENT_WORKER_IMAGE: ${{ env.TIDEPOOL_DEPLOY_AGENT_WORKER_IMAGE }}
      - name: comment deploy result on the merged PR (GitLab-style PR visibility)
        # GitHub's native `environment:` deployment auto-links to a PR only when the
        # PR's head sha lands on main — which squash-merge (our default) never does,
        # so the merged PR shows no deploy. Resolve the PR the merge commit closed and
        # post the deploy result as a comment (the Vercel/Netlify pattern). Best-effort:
        # a comment failure must never fail a green apply, hence `|| true`.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '.[0].number' 2>/dev/null || true)
          [ -n "$pr" ] && [ "$pr" != "null" ] || { echo "no PR for ${{ github.sha }}; skipping comment"; exit 0; }
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          env_url="${{ github.server_url }}/${{ github.repository }}/deployments/production"
          gh api "repos/${{ github.repository }}/issues/${pr}/comments" \
            -f body="🚀 Deployed \`${{ github.sha }}\` to **production** — [run](${run_url}) · [environment](${env_url})" \
            >/dev/null || true
