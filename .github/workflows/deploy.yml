name: deploy

# Build the tidepool images (shared base → control-plane + agent-worker) and
# deploy the Kubernetes cluster (Pulumi, infra/pulumi/cluster) — one workflow so
# `apply` depends on `build-images` via `needs:` instead of polling ghcr.
#   PR   → `build-images` builds (no push) to prove the Dockerfiles are valid;
#          `preview` runs `pulumi preview` (read-only) when infra-relevant paths
#          changed.
#   main → `build-images` builds + pushes to ghcr by tag (:${sha} + :latest),
#          then `apply` runs `pulumi up` with THIS commit's freshly-built image
#          digests — no human gate (personal scale, blast radius small).
#          On success it comments the deploy result on the merged PR — squash
#          merges break GitHub's native PR↔deployment link, so we post it
#          ourselves.
#
# Secrets flow: SOPS_AGE_KEY (the `ci` age key) is the ONLY GitHub Actions secret.
# It decrypts the hcloud token, Hetzner S3 creds, and the Pulumi config passphrase
# from sops at run time; the S3 creds also unlock the self-managed Pulumi state
# backend, and the passphrase decrypts that state's secrets. Nothing else is a
# GH secret; nothing sensitive is committed.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write # build-images pushes to ghcr
  pull-requests: write # apply comments the deploy result on the merged PR (GitLab-style visibility)
  deployments: read # apply reads the environment deployment url for the PR comment

env:
  REGISTRY: ghcr.io
  WORK_DIR: infra/pulumi/cluster
  STACK: production
  # Self-managed Pulumi state on Hetzner Object Storage (public, non-secret).
  PULUMI_BACKEND_URL: 's3://tidepool-pulumi-state?endpoint=nbg1.your-objectstorage.com&s3ForcePathStyle=true&region=nbg1'
  AWS_REGION: nbg1
  SOPS_VERSION: v3.13.2

jobs:
  # Path gate for the two secrets-touching jobs below — the workflow's own push/
  # pull_request triggers are unconditional so build-images always builds+validates
  # (matches its old images.yml behavior), and preview/apply instead gate on this
  # job's output (matches infra.yml's old per-event path filters).
  changes:
    runs-on: ubuntu-latest
    outputs:
      preview: ${{ steps.filter.outputs.preview }}
      apply: ${{ steps.filter.outputs.apply }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            preview:
              - 'infra/pulumi/cluster/**'
              - '.github/workflows/deploy.yml'
              - 'secrets/hcloud_api_token.enc.yaml'
              - 'secrets/hetzner_s3_credentials.enc.yaml'
              - 'secrets/pulumi_config_passphrase.enc.yaml'
              - '.sops.yaml'
            apply:
              - 'src/**'
              - 'package.json'
              - 'bun.lock'
              - 'infra/docker/**'
              - 'infra/pulumi/cluster/**'
              - '.github/workflows/deploy.yml'
              - 'secrets/hcloud_api_token.enc.yaml'
              - 'secrets/hetzner_s3_credentials.enc.yaml'
              - 'secrets/pulumi_config_passphrase.enc.yaml'
              - '.sops.yaml'

  preview:
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.preview == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: infra-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19
      - name: install deps
        working-directory: ${{ env.WORK_DIR }}
        run: bun install --frozen-lockfile
      - name: decrypt creds (sops + ci age key)
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          curl -fsSL -o /usr/local/bin/sops \
            "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.amd64"
          chmod +x /usr/local/bin/sops
          hcloud_token=$(sops -d --extract '["hcloud_api_token"]' secrets/hcloud_api_token.enc.yaml)
          aws_key=$(sops -d --extract '["access_key_id"]' secrets/hetzner_s3_credentials.enc.yaml)
          aws_secret=$(sops -d --extract '["secret_access_key"]' secrets/hetzner_s3_credentials.enc.yaml)
          pulumi_passphrase=$(sops -d --extract '["pulumi_config_passphrase"]' secrets/pulumi_config_passphrase.enc.yaml)
          echo "::add-mask::$hcloud_token"; echo "::add-mask::$aws_key"; echo "::add-mask::$aws_secret"
          echo "::add-mask::$pulumi_passphrase"
          {
            echo "HCLOUD_TOKEN=$hcloud_token"
            echo "AWS_ACCESS_KEY_ID=$aws_key"
            echo "AWS_SECRET_ACCESS_KEY=$aws_secret"
            echo "PULUMI_CONFIG_PASSPHRASE=$pulumi_passphrase"
          } >>"$GITHUB_ENV"
      - name: pulumi preview
        uses: pulumi/actions@v7
        with:
          command: preview
          stack-name: ${{ env.STACK }}
          # Create `production` in the fresh S3 backend if absent (stack select
          # --create); no-op selecting the existing stack on later runs.
          upsert: true
          work-dir: ${{ env.WORK_DIR }}
          cloud-url: ${{ env.PULUMI_BACKEND_URL }}
        # PULUMI_CONFIG_PASSPHRASE is exported to $GITHUB_ENV from sops above.

  build-images:
    runs-on: ubuntu-latest
    concurrency:
      # push-to-main builds keyed by sha — apply needs: this job's outputs for a
      # specific sha, so one push must never cancel another push's in-flight
      # build. PR builds still dedupe/cancel by ref.
      group: images-${{ github.event_name == 'push' && github.sha || github.ref }}
      cancel-in-progress: true
    outputs:
      control-plane-image: ${{ steps.resolve.outputs.control-plane-image }}
      agent-worker-image: ${{ steps.resolve.outputs.agent-worker-image }}
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4

      # Lowercase the owner — ghcr repository paths must be lowercase, GitHub
      # org/user names may not be.
      - name: compute image prefix
        id: prefix
        run: echo "value=${REGISTRY}/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/tidepool" >>"$GITHUB_OUTPUT"

      # Base first (GHA-cached so an unchanged Dockerfile is a cache hit instead
      # of the ~6-8min cold rebuild — this is where the expensive apt/opencode
      # layers live). `--load` puts it in the local docker daemon; the two
      # derived builds then use plain `docker build` (not buildx), since the
      # docker-container driver buildx needs for GHA caching can't see a
      # locally-loaded image for FROM resolution — it tries to pull it from
      # Docker Hub instead. Derived images are cheap (just COPY app source onto
      # base), so plain local-daemon builds in parallel is the right tradeoff.
      - name: build base
        run: >
          docker buildx build -f infra/docker/base.Dockerfile
          --cache-from type=gha,scope=base --cache-to type=gha,scope=base,mode=max
          --load -t tidepool-base:latest .
      - name: build control-plane + agent-worker (parallel)
        run: |
          set -eu
          docker build -f infra/docker/control-plane.Dockerfile \
            --build-arg BASE_IMAGE=tidepool-base:latest \
            -t tidepool-control-plane:latest . &
          pids=("$!")
          docker build -f infra/docker/agent-worker.Dockerfile \
            --build-arg BASE_IMAGE=tidepool-base:latest \
            -t tidepool-agent-worker:latest . &
          pids+=("$!")
          status=0
          for pid in "${pids[@]}"; do
            wait "$pid" || status=1
          done
          exit "$status"

      - name: log in to ghcr
        if: github.event_name == 'push'
        run: echo '${{ secrets.GITHUB_TOKEN }}' | docker login "$REGISTRY" -u '${{ github.actor }}' --password-stdin

      - name: tag + push
        if: github.event_name == 'push'
        run: |
          set -eux
          prefix='${{ steps.prefix.outputs.value }}'
          sha='${{ github.sha }}'
          for img in base control-plane agent-worker; do
            local_tag="tidepool-${img}:latest"
            docker tag "$local_tag" "${prefix}-${img}:${sha}"
            docker tag "$local_tag" "${prefix}-${img}:latest"
            docker push "${prefix}-${img}:${sha}"
            docker push "${prefix}-${img}:latest"
          done

      # Just-pushed, so a single inspect is guaranteed to find it — no poll.
      # apply consumes these directly via needs.build-images.outputs.
      - name: resolve pushed digests
        if: github.event_name == 'push'
        id: resolve
        run: |
          set -eu
          prefix='${{ steps.prefix.outputs.value }}'
          sha='${{ github.sha }}'
          for img in control-plane agent-worker; do
            digest=$(docker buildx imagetools inspect "${prefix}-${img}:${sha}" --format '{{.Manifest.Digest}}')
            echo "${img}-image=${prefix}-${img}@${digest}" >>"$GITHUB_OUTPUT"
          done

  apply:
    needs: [changes, build-images]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.apply == 'true'
    runs-on: ubuntu-latest
    concurrency:
      # Never cancel an in-flight apply; concurrent merges queue and run serially.
      group: deploy-${{ github.ref }}
      cancel-in-progress: false
    # Fully automatic: build-images builds+pushes, this job applies with those
    # digests — no human gate (personal scale, blast radius small). The
    # `production` environment is kept as a GitHub deployment label only; add
    # required reviewers here to reintroduce a gate.
    environment: production
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19
      - name: install deps
        working-directory: ${{ env.WORK_DIR }}
        run: bun install --frozen-lockfile
      - name: install hcloud CLI + hcloud-upload-image (Talos snapshot bake)
        run: |
          # hcloud CLI — bake-talos.sh queries/labels snapshots with it.
          cli=v1.51.0
          curl -fsSL -o /tmp/hcloud.tar.gz \
            "https://github.com/hetznercloud/cli/releases/download/${cli}/hcloud-linux-amd64.tar.gz"
          tar -xzf /tmp/hcloud.tar.gz -C /usr/local/bin hcloud
          chmod +x /usr/local/bin/hcloud
          # hcloud-upload-image — bakes the Talos snapshot (throwaway server).
          # Tool lives under apricote/ (the maintainer), not the hetznercloud org.
          ver=v1.5.0
          curl -fsSL -o /tmp/hui.tar.gz \
            "https://github.com/apricote/hcloud-upload-image/releases/download/${ver}/hcloud-upload-image_Linux_x86_64.tar.gz"
          tar -xzf /tmp/hui.tar.gz -C /usr/local/bin hcloud-upload-image
          chmod +x /usr/local/bin/hcloud-upload-image
      - name: decrypt creds (sops + ci age key)
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          curl -fsSL -o /usr/local/bin/sops \
            "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.amd64"
          chmod +x /usr/local/bin/sops
          hcloud_token=$(sops -d --extract '["hcloud_api_token"]' secrets/hcloud_api_token.enc.yaml)
          aws_key=$(sops -d --extract '["access_key_id"]' secrets/hetzner_s3_credentials.enc.yaml)
          aws_secret=$(sops -d --extract '["secret_access_key"]' secrets/hetzner_s3_credentials.enc.yaml)
          pulumi_passphrase=$(sops -d --extract '["pulumi_config_passphrase"]' secrets/pulumi_config_passphrase.enc.yaml)
          # PR-6.5 (human-approved tenet-9 widening): the control-plane k8s Secret
          # is seeded from these two. apply job ONLY — preview renders them empty.
          forge_token=$(sops -d --extract '["forge_github_token"]' secrets/forge_github_token.enc.yaml)
          opencode_auth=$(sops -d --extract '["runner_opencode_auth_json"]' secrets/runner_opencode_auth_json.enc.yaml)
          echo "::add-mask::$hcloud_token"; echo "::add-mask::$aws_key"; echo "::add-mask::$aws_secret"
          echo "::add-mask::$pulumi_passphrase"; echo "::add-mask::$forge_token"
          # opencode auth is JSON and may be multi-line: mask line-by-line — a single
          # `::add-mask::$multiline` would register only line 1 and PRINT the rest.
          while IFS= read -r l; do [ -n "$l" ] && echo "::add-mask::$l"; done <<<"$opencode_auth"
          {
            echo "HCLOUD_TOKEN=$hcloud_token"
            echo "AWS_ACCESS_KEY_ID=$aws_key"
            echo "AWS_SECRET_ACCESS_KEY=$aws_secret"
            echo "PULUMI_CONFIG_PASSPHRASE=$pulumi_passphrase"
            echo "TIDEPOOL_FORGE_GITHUB_TOKEN=$forge_token"
          } >>"$GITHUB_ENV"
          # Multi-line-safe export (heredoc): a plain `NAME=$val` truncates JSON at
          # the first newline and corrupts $GITHUB_ENV.
          {
            echo "TIDEPOOL_OPENCODE_AUTH_JSON<<TIDEPOOL_OC_EOF"
            printf '%s\n' "$opencode_auth"
            echo "TIDEPOOL_OC_EOF"
          } >>"$GITHUB_ENV"
      - name: compute this runner's egress IP (#4 JIT apiserver reachability)
        run: |
          # The firewall opens 6443+50000 to admin /32(s) + THIS runner /32, applied
          # THROUGH pulumi (no out-of-band drift). Fail if the IP can't be resolved —
          # a missing runner IP would otherwise apply with the ports admin-only and
          # the bootstrap/apply steps would hang.
          ip=$(curl -fsSL https://api.ipify.org)
          [ -n "$ip" ] || { echo "could not resolve runner IP"; exit 1; }
          echo "::add-mask::$ip"
          echo "TIDEPOOL_CI_RUNNER_CIDR=${ip}/32" >>"$GITHUB_ENV"
      - name: ensure Pulumi state bucket exists (bootstrap seam)
        # Pulumi can't create its own backend (circular), so this idempotent step
        # (re)creates tidepool-pulumi-state from the sops-decrypted S3 keys already in
        # $GITHUB_ENV — making a keys-only cold start (scorched-earth → rebuild) fully
        # hands-free. RGW-idempotent, so a normal deploy is a no-op. apply job ONLY:
        # preview is read-only and must never create a resource. AWS_REGION is the
        # top-level env; AWS_ACCESS_KEY_ID/SECRET come from the decrypt step above.
        run: bash infra/pulumi/cluster/ensure-state-bucket.sh
      - name: pulumi up
        uses: pulumi/actions@v7
        with:
          command: up
          stack-name: ${{ env.STACK }}
          # Create `production` in the fresh S3 backend if absent (stack select
          # --create); no-op selecting the existing stack on later runs.
          upsert: true
          work-dir: ${{ env.WORK_DIR }}
          cloud-url: ${{ env.PULUMI_BACKEND_URL }}
        env:
          # PULUMI_CONFIG_PASSPHRASE is exported to $GITHUB_ENV from sops above.
          # Consumed by config.ts → firewall control-port allow-list (self-healing;
          # next apply overwrites this /32 with the new runner IP).
          TIDEPOOL_CI_RUNNER_CIDR: ${{ env.TIDEPOOL_CI_RUNNER_CIDR }}
          # Auto-deploy: build-images job's just-pushed digests → config.ts pickImage override.
          TIDEPOOL_DEPLOY_CONTROL_PLANE_IMAGE: ${{ needs.build-images.outputs.control-plane-image }}
          TIDEPOOL_DEPLOY_AGENT_WORKER_IMAGE: ${{ needs.build-images.outputs.agent-worker-image }}
          # Provenance: stamp this commit as the tidepool/git-sha label on the
          # reconciler + (rethreaded) every worker pod → config.ts GIT_SHA.
          TIDEPOOL_GIT_SHA: ${{ github.sha }}
      - name: comment deploy result on the merged PR (GitLab-style PR visibility)
        # GitHub's native `environment:` deployment auto-links to a PR only when the
        # PR's head sha lands on main — which squash-merge (our default) never does,
        # so the merged PR shows no deploy. Resolve the PR the merge commit closed and
        # post the deploy result as a comment (the Vercel/Netlify pattern). Best-effort:
        # a comment failure must never fail a green apply, hence `|| true`.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '.[0].number' 2>/dev/null || true)
          [ -n "$pr" ] && [ "$pr" != "null" ] || { echo "no PR for ${{ github.sha }}; skipping comment"; exit 0; }
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          env_url="${{ github.server_url }}/${{ github.repository }}/deployments/production"
          gh api "repos/${{ github.repository }}/issues/${pr}/comments" \
            -f body="🚀 Deployed \`${{ github.sha }}\` to **production** — [run](${run_url}) · [environment](${env_url})" \
            >/dev/null || true
