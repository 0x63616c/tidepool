name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    # Postgres service container so the parametrized TicketStore contract runs on
    # pg in CI too, not just sqlite — the cutover's whole point, mechanically
    # gate-enforced (tenet 5). The test skips this backing when the URL is unset
    # (local `bun run check` needs no cluster); here we set it so pg is covered.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19
      - run: bun install --frozen-lockfile
      - name: biome
        run: bun run lint
      - name: typecheck
        run: bun run typecheck
      - name: test
        run: bun run test
        env:
          TIDEPOOL_TEST_PG_URL: postgresql://postgres:postgres@localhost:5432/postgres

  # Proves the worker install recipe (bake.sh) actually works on a clean box.
  # Runs the EXPORTED workerInstallScript() byte-for-byte inside a STOCK
  # ubuntu:24.04 container (NOT the baked snapshot — that would defeat the test),
  # then asserts the runner's prerequisites resolve: the .tp-ready sentinel, bun,
  # and the opencode binary. If bake.sh rots, this job goes red before a real
  # worker ever boots.
  container-harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19
      - run: bun install --frozen-lockfile
      - name: materialize the install recipe from workerInstallScript()
        run: |
          mkdir -p harness
          bun -e 'import { workerInstallScript } from "./src/hetzner-box.ts"; await Bun.write("harness/install.sh", workerInstallScript());'
          test -s harness/install.sh
      - name: run the recipe in a clean ubuntu:24.04 container
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/work" -w /work ubuntu:24.04 bash -c "
            set -eux
            apt-get update
            apt-get install -y --no-install-recommends git curl unzip ca-certificates
            bash harness/install.sh
            touch /tmp/.tp-ready
            test -f /tmp/.tp-ready
            export PATH=/root/.bun/bin:\$PATH
            command -v bun
            bun --version
            test -x /root/.bun/bin/opencode
            command -v opencode
          "

  # Shell lint/format for the Claude Code secret hooks + infra scripts (same as the lefthook
  # pre-commit shellcheck/shfmt). shellcheck is preinstalled on ubuntu-latest; shfmt is fetched.
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19
      - name: install shfmt
        run: |
          curl -sSfL https://github.com/mvdan/sh/releases/download/v3.10.0/shfmt_v3.10.0_linux_amd64 -o /usr/local/bin/shfmt
          chmod +x /usr/local/bin/shfmt
      - name: shellcheck + shfmt
        run: bun run lint:sh
      - name: validate redaction-hashes.json
        # CI can't decrypt to verify hash CONTENT (no age key — tenet 9), but it can enforce the file
        # is present, non-empty, and well-formed sha256 digests, so a corrupt/blank list can't merge.
        run: |
          jq -e '.algo == "sha256" and (.hashes | type == "array") and (.hashes | length > 0)
                 and (all(.hashes[]; test("^[0-9a-f]{64}$")))' .claude/redaction-hashes.json > /dev/null

  # Mechanical leak guardrail (same scan as the lefthook pre-commit hook).
  # Full-history scan; encrypted secrets/*.enc.* are allowlisted in .gitleaks.toml.
  # Add `gitleaks` to main's required status checks once this lands.
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19
      - run: bun install --frozen-lockfile
      - name: commitlint
        run: bunx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
