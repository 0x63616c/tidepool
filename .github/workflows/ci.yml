name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19
      - run: bun install --frozen-lockfile
      - name: biome
        run: bun run lint
      - name: typecheck
        run: bun run typecheck
      - name: test
        run: bun run test

  # Proves the worker install recipe (bake.sh) actually works on a clean box.
  # Runs the EXPORTED workerInstallScript() byte-for-byte inside a STOCK
  # ubuntu:24.04 container (NOT the baked snapshot — that would defeat the test),
  # then asserts the runner's prerequisites resolve: the .tp-ready sentinel, bun,
  # and the opencode binary. If bake.sh rots, this job goes red before a real
  # worker ever boots.
  container-harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19
      - run: bun install --frozen-lockfile
      - name: materialize the install recipe from workerInstallScript()
        run: |
          mkdir -p harness
          bun -e 'import { workerInstallScript } from "./src/hetzner-box.ts"; await Bun.write("harness/install.sh", workerInstallScript());'
          test -s harness/install.sh
      - name: run the recipe in a clean ubuntu:24.04 container
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/work" -w /work ubuntu:24.04 bash -c "
            set -eux
            apt-get update
            apt-get install -y --no-install-recommends git curl unzip ca-certificates
            bash harness/install.sh
            touch /tmp/.tp-ready
            test -f /tmp/.tp-ready
            export PATH=/root/.bun/bin:\$PATH
            command -v bun
            bun --version
            test -x /root/.bun/bin/opencode
            command -v opencode
          "

  # Mechanical leak guardrail (same scan as the lefthook pre-commit hook).
  # Full-history scan; encrypted secrets/*.enc.* are allowlisted in .gitleaks.toml.
  # Add `gitleaks` to main's required status checks once this lands.
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19
      - run: bun install --frozen-lockfile
      - name: commitlint
        run: bunx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
