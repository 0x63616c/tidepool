# sops creation rules — one file per secret, each with its own recipient set.
# The recipient ANCHORS below are the access-control matrix: to change who can
# decrypt a secret, edit that secret's rule and run `sops updatekeys <file>`.
#
#   mainbox    — the always-on control plane (private key lives ONLY on the box)
#   ci         — GitHub Actions (Pulumi-in-CI). Decrypts 5 secrets: hcloud_api_token,
#                hetzner_s3_credentials, pulumi_config_passphrase, and (PR-6.5,
#                human-approved tenet-9 widening) forge_github_token +
#                runner_opencode_auth_json — so `pulumi up` can create the
#                control-plane k8s Secret. Widening ci must be re-scoped/rotated in
#                the deferred rotation pass.
#   breakglass — Calum's offline recovery key (recipient of EVERY secret)
#
# Holds NO secret values (those live in secrets/*.enc.yaml, encrypted). Tenet 9:
# the master key never leaves the main box; workers get JIT-decrypted creds over SSH.

keys:
  - &mainbox    age1368zpnurgca5mraqvf3d8d6sl6ctkpxd7ht2mwuvmevpxu74j5tsms9lur
  - &ci         age1c8rzq8txxlq4g6zu0yn46rr9rdzfyn3j5u9d8cxnq2h5w3yrve6sjs3gkc
  - &breakglass age1ewkw53p9v6w44uae75kxnnwnmnt9etqpkems2kjqkyjwldrjju0qe2t4tn

creation_rules:
  # Hetzner API token — box provisions workers; (future) Pulumi-in-CI. CI-readable.
  - path_regex: secrets/hcloud_api_token\.enc\.yaml$
    key_groups:
      - age: [*ci, *mainbox, *breakglass]

  # GitHub PAT — reconciler/Forge. CI-readable since PR-6.5: `pulumi up` seeds it
  # into the control-plane k8s Secret (human-approved tenet-9 widening).
  - path_regex: secrets/forge_github_token\.enc\.yaml$
    key_groups:
      - age: [*ci, *mainbox, *breakglass]

  # opencode auth.json — AgentRunner subscription credential. CI-readable since
  # PR-6.5: seeded into the control-plane k8s Secret (human-approved widening).
  - path_regex: secrets/runner_opencode_auth_json\.enc\.yaml$
    key_groups:
      - age: [*ci, *mainbox, *breakglass]

  # Shared fleet SSH identity (root on every box + operator laptop). Box-only.
  - path_regex: secrets/ssh_tidepool_private_key\.enc\.yaml$
    key_groups:
      - age: [*mainbox, *breakglass]

  # Hetzner Object Storage (S3) creds — Pulumi state backend + (PR-5b) CNPG
  # backups. Pulumi-in-CI reads it, so CI-readable. Above the catch-all.
  - path_regex: secrets/hetzner_s3_credentials\.enc\.yaml$
    key_groups:
      - age: [*ci, *mainbox, *breakglass]

  # Pulumi config passphrase — encrypts the self-managed Pulumi state's secrets.
  # Read ONLY by Pulumi-in-CI (not the box), so CI-only (least-priv, no mainbox).
  - path_regex: secrets/pulumi_config_passphrase\.enc\.yaml$
    key_groups:
      - age: [*ci, *breakglass]

  # Catch-all so any NEW secrets/*.enc.* file is at least sealed to box+breakglass
  # until it gets its own explicit rule above. sops uses the FIRST matching rule,
  # so this MUST stay last.
  - path_regex: secrets/.*\.enc\.(yaml|json)$
    key_groups:
      - age: [*mainbox, *breakglass]
