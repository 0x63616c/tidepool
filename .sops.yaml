# sops creation rules — one file per secret, each with its own recipient set.
# The recipient ANCHORS below are the access-control matrix: to change who can
# decrypt a secret, edit that secret's rule and run `sops updatekeys <file>`.
#
#   ci         — GitHub Actions (Pulumi-in-CI). Decrypts hcloud_api_token,
#                hetzner_s3_credentials, pulumi_config_passphrase, forge_github_token,
#                and runner_opencode_auth_json — so `pulumi up` can create the
#                control-plane k8s Secret that the Deployment mounts.
#   breakglass — Calum's offline recovery key (recipient of EVERY secret)
#
# The old `mainbox` recipient (the always-on Hetzner control-plane box, whose
# private key lived only on that box) was removed once the box was torn down and
# the control plane moved to k8s — CI now seeds every runtime secret into the
# cluster, so nothing decrypts sops on a box anymore.
#
# Holds NO secret values (those live in secrets/*.enc.yaml, encrypted). Tenet 9:
# runtime creds are JIT-decrypted by CI and seeded into the in-cluster k8s Secret;
# no master key leaves this repo's encrypted store.

keys:
  - &ci         age1c8rzq8txxlq4g6zu0yn46rr9rdzfyn3j5u9d8cxnq2h5w3yrve6sjs3gkc
  - &breakglass age1ewkw53p9v6w44uae75kxnnwnmnt9etqpkems2kjqkyjwldrjju0qe2t4tn

creation_rules:
  # Hetzner API token — Pulumi-in-CI (cluster provisioning). CI-readable.
  - path_regex: secrets/hcloud_api_token\.enc\.yaml$
    key_groups:
      - age: [*ci, *breakglass]

  # GitHub PAT — reconciler/Forge. CI-readable: `pulumi up` seeds it into the
  # control-plane k8s Secret.
  - path_regex: secrets/forge_github_token\.enc\.yaml$
    key_groups:
      - age: [*ci, *breakglass]

  # opencode auth.json — AgentRunner subscription credential. CI-readable: seeded
  # into the control-plane k8s Secret.
  - path_regex: secrets/runner_opencode_auth_json\.enc\.yaml$
    key_groups:
      - age: [*ci, *breakglass]

  # Hetzner Object Storage (S3) creds — Pulumi state backend + CNPG backups.
  # Pulumi-in-CI reads it, so CI-readable. Above the catch-all.
  - path_regex: secrets/hetzner_s3_credentials\.enc\.yaml$
    key_groups:
      - age: [*ci, *breakglass]

  # Pulumi config passphrase — encrypts the self-managed Pulumi state's secrets.
  # Read ONLY by Pulumi-in-CI, so CI + breakglass.
  - path_regex: secrets/pulumi_config_passphrase\.enc\.yaml$
    key_groups:
      - age: [*ci, *breakglass]

  # Catch-all so any NEW secrets/*.enc.* file is at least sealed to ci+breakglass
  # until it gets its own explicit rule above. sops uses the FIRST matching rule,
  # so this MUST stay last.
  - path_regex: secrets/.*\.enc\.(yaml|json)$
    key_groups:
      - age: [*ci, *breakglass]
